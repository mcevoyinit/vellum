<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2b04a"/>
      <stop offset="100%" style="stop-color:#c4922e"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Scroll/parchment shape -->
  <g transform="translate(30, 22)">
    <!-- Main document body -->
    <rect x="8" y="8" width="44" height="60" rx="3" fill="url(#accent)" opacity="0.9"/>
    <!-- Top curl -->
    <path d="M8,14 Q8,4 18,4 L52,4 Q56,4 56,8 Q56,14 52,14 Z" fill="url(#accent)" opacity="0.7"/>
    <!-- Bottom curl -->
    <path d="M8,62 Q8,72 18,72 L52,72 Q56,72 56,68 Q56,62 52,62 Z" fill="url(#accent)" opacity="0.7"/>
    <!-- Text lines -->
    <line x1="16" y1="24" x2="44" y2="24" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="16" y1="32" x2="40" y2="32" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="16" y1="40" x2="42" y2="40" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="16" y1="48" x2="36" y2="48" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Seal circle -->
    <circle cx="40" cy="56" r="8" fill="#1a1a2e" opacity="0.6"/>
    <circle cx="40" cy="56" r="5" fill="url(#accent)" opacity="0.8"/>
  </g>
  <!-- V letterform -->
  <text x="60" y="105" font-family="Georgia, serif" font-size="16" fill="#e2b04a" text-anchor="middle" opacity="0.6">V</text>
</svg>
